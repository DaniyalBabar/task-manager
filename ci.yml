name: CI — Build & Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build & Push Backend ────────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/taskmanager-backend:latest
            ${{ env.DOCKERHUB_USERNAME }}/taskmanager-backend:${{ github.sha }}

      # ── Build & Push Frontend ───────────────────────────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/taskmanager-frontend:latest
            ${{ env.DOCKERHUB_USERNAME }}/taskmanager-frontend:${{ github.sha }}

      # ── Update K8s Manifests with new image tag ─────────────
      - name: Update image tags in Kubernetes manifests
        run: |
          sed -i "s|taskmanager-backend:.*|taskmanager-backend:${{ github.sha }}|g" k8s/manifests.yaml
          sed -i "s|taskmanager-frontend:.*|taskmanager-frontend:${{ github.sha }}|g" k8s/manifests.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/manifests.yaml
          git diff --cached --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
