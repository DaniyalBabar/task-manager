apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskmanager
  namespace: argocd
spec:
  project: default

  # Where ArgoCD pulls manifests from
  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/task-manager   # ← update this
    targetRevision: main
    path: k8s

  # Where ArgoCD deploys to
  destination:
    server: https://kubernetes.default.svc
    namespace: taskmanager

  syncPolicy:
    automated:
      prune: true      # delete resources removed from git
      selfHeal: true   # revert manual cluster changes
    syncOptions:
      - CreateNamespace=true
